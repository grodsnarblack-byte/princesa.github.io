<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Minha Princesa Nicole ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;

/* fundo gato */
background-image:url("https://images.unsplash.com/photo-1518791841217-8f162f1e1131");
background-size:cover;
background-position:center;
}

/* escurecer fundo */

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.container{
position:relative;
z-index:2;
background:#222;
padding:40px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,0,120,0.5);
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

#sim{
background:#ff3b6f;
color:white;
}

#nao{
background:#444;
color:white;
position:relative;
}

.opcoes{
display:none;
}

/* corações */

.heart{
position:absolute;
font-size:20px;
color:#ff4d88;
animation:fall 6s linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-10vh);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">

<div id="pergunta1">

<h1>Olá princesa, você me ama Bingole? ❤️</h1>

<button id="sim">Sim 😍</button>
<button id="nao">Não 🙁</button>

</div>

<div id="pergunta2" class="opcoes">

<h2>Quanto você me ama?</h2>

<button onclick="alert('so isso😭')">
Muito
</button>

<button onclick="alert('Muito muito também vale 😍')">
Muito muito
</button>

<button onclick="abrirVideo()">
Tamanho do céu ☁️
</button>

</div>

</div>

<script>

/* botão fugir */

let tentativas = 0
let nao = document.getElementById("nao")

nao.addEventListener("mouseover",function(){

let x = Math.random()*200-100
let y = Math.random()*200-100

nao.style.transform=`translate(${x}px,${y}px)`

})

nao.addEventListener("click",function(){

tentativas++

if(tentativas>=3){

window.open(
"https://www.youtube.com/watch?v=Oqg9LJ3n6u0",
"_blank"
)

}

})

/* botão sim */

document.getElementById("sim").onclick=function(){

document.getElementById("pergunta1").style.display="none"
document.getElementById("pergunta2").style.display="block"

}

/* abrir youtube */

function abrirVideo(){

window.open(
"https://youtu.be/ocBJ-lao81o?si=n7yN0cDCuvcvHTvW&t=1",
"_blank"
)

}

/* corações caindo */

function criarCoracao(){

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(criarCoracao,400)

</script>

</body>
</html>
